server {
    listen 443 ssl;
    server_name pma.dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://phpmyadmin:80/;
        proxy_redirect off;
    }
}

# Mailhog（WebSocket対応）
server {
    listen 443 ssl;
    server_name mailhog.dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://mailhog:8025;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
