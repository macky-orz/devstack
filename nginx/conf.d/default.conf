# 共通proxy設定
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

client_max_body_size 100M;

proxy_connect_timeout 60s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;

proxy_set_header Host $host;
proxy_set_header X-Forwarded-Host $http_host;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Real-IP $remote_addr;

proxy_http_version 1.1;

proxy_set_header Connection "";

server {
    listen 80;
    server_name localhost;
    return 301 https://dev.localhost$request_uri;
}

server {
    listen 443 ssl;
    server_name dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://apache:80/dev/;
        proxy_redirect off;
    }
}

server {
    listen 443 ssl;
    server_name project-a.dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://apache:80/project-a/;
        proxy_redirect off;
    }
}

server {
    listen 443 ssl;
    server_name project-b.dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://apache:80/project-b/;
        proxy_redirect off;
    }
