server {
    listen 443 ssl;
    server_name adminer.dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://adminer:8080/;
        proxy_redirect off;
    }
}

server {
    listen 443 ssl;
    server_name mailhog.dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://mailhog:8025;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
