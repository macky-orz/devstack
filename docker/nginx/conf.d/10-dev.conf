server {
    listen 80 default_server;
    server_name localhost _;

    return 301 https://dev.localhost/;
}

server {
    listen 443 ssl default_server;
    server_name localhost _;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    return 301 https://dev.localhost/;
}

server {
    listen 443 ssl;
    server_name dev.localhost;

    ssl_certificate /etc/nginx/certs/dev.localhost.pem;
    ssl_certificate_key /etc/nginx/certs/dev.localhost-key.pem;

    location / {
        proxy_pass http://apache:80/dashboard/;

        proxy_redirect http://apache:80/dashboard/ /;
        proxy_redirect /dashboard/ /;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
