services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - apache
      - phpmyadmin
      - adminer
      - mailhog
    networks:
      - devnet

  apache:
    build: ./php
    volumes:
      - ../webstack:/var/www/html/webstack:ro
      - ./projects/dev:/var/www/html/dev:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PHP_IDE_CONFIG: "serverName=dev.localhost"
      XDEBUG_CONFIG: "client_host=host.docker.internal"
    networks:
      - devnet

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-log-bin
      --innodb-buffer-pool-size=64M
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - devnet

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_ABSOLUTE_URI: https://pma.dev.localhost/
      PMA_FORCE_SSL: "true"
    depends_on:
      - mysql
    networks:
      - devnet

  adminer:
    image: adminer
    depends_on:
      - mysql
    volumes:
      - ./adminer/adminer.css:/var/www/html/adminer.css
    networks:
      - devnet

  mailhog:
    image: mailhog/mailhog
    command: ["-smtp-bind-addr=0.0.0.0:1025"]
    networks:
      - devnet

networks:
  devnet:
    driver: bridge
