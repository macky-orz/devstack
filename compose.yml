services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - apache
      - mysql
      - adminer
      - mailhog
    networks:
      - devnet

  apache:
    build: ./php
    volumes:
      - ../webstack:/var/www/html/webstack:cached
      - ../sites:/var/www/html/sites:cached
      - ./dev:/var/www/html/dev:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PHP_IDE_CONFIG: "serverName=dev.localhost"
      XDEBUG_CONFIG: "client_host=host.docker.internal"
    networks:
      - devnet

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-log-bin
      --innodb-buffer-pool-size=64M
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devnet

  adminer:
    image: adminer
    depends_on:
      - mysql
    volumes:
      - ./adminer/adminer.css:/var/www/html/adminer.css
    networks:
      - devnet

  mailhog:
    image: mailhog/mailhog
    command: ["-smtp-bind-addr=0.0.0.0:1025"]
    networks:
      - devnet

networks:
  devnet:
    name: devnet
    driver: bridge

volumes:
  mysql_data:
