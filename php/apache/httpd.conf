<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    SetEnvIf X-Forwarded-Proto https HTTPS=on
    RequestHeader set X-Forwarded-Proto "https"

    LogLevel warn
</VirtualHost>
